# CircuitPython settings
# Floats are NOT supported; use quoted strings and parse in code

# WiFi
CIRCUITPY_WIFI_SSID = "WifiSSID"
CIRCUITPY_WIFI_PASSWORD = "WiFipassword"

# Timezone (offset from UTC in hours)
TIME_OFFSET = "-5.0"
STANDARD_STRING = "EST"
DAYLIGHT_STRING = "EDT"

# NTP
NTP_SERVER = "pool.ntp.org"
NTP_SYNC_HOUR = "5"
NTP_SYNC_MINUTE = "0"
